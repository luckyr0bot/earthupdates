    <script>
        const user = JSON.parse(localStorage.getItem('user') || '{}');
        const token = localStorage.getItem('token');

        if (!user.username) {
            window.location.href = '/login.html';
        }

        let userRank = user.rank;
        if (token) {
            try {
                const decoded = Buffer.from(token, 'base64').toString('utf8').split(':');
                if (decoded[2]) {
                    userRank = decoded[2];
                }
            } catch (err) {
                console.error('Error decoding token');
            }
        }

        document.getElementById('userDisplay').textContent = user.username;
        document.getElementById('rankDisplay').textContent = userRank || 'USER';
        
        if (userRank === 'admin') {
            document.getElementById('rankDisplay').classList.add('admin');
        } else if (userRank === 'owner') {
            document.getElementById('rankDisplay').classList.add('owner');
        }

        if (userRank === 'admin' || userRank === 'owner') {
            document.getElementById('headerLeft').classList.add('show');
        }

        const settingsModal = document.getElementById('settingsModal');
        const editModal = document.getElementById('editModal');
        const deleteModal = document.getElementById('deleteModal');
        const pendingModal = document.getElementById('pendingModal');
        const banModal = document.getElementById('banModal');
        const warnModal = document.getElementById('warnModal');
        const adminPanel = document.getElementById('adminPanel');

        document.getElementById('settingsBtn').addEventListener('click', () => {
            settingsModal.classList.add('show');
        });

        settingsModal.addEventListener('click', (e) => {
            if (e.target === settingsModal) {
                settingsModal.classList.remove('show');
            }
        });

        editModal.addEventListener('click', (e) => {
            if (e.target === editModal) {
                editModal.classList.remove('show');
            }
        });

        deleteModal.addEventListener('click', (e) => {
            if (e.target === deleteModal) {
                deleteModal.classList.remove('show');
            }
        });

        pendingModal.addEventListener('click', (e) => {
            if (e.target === pendingModal) {
                pendingModal.classList.remove('show');
            }
        });

        banModal.addEventListener('click', (e) => {
            if (e.target === banModal) {
                banModal.classList.remove('show');
            }
        });

        warnModal.addEventListener('click', (e) => {
            if (e.target === warnModal) {
                warnModal.classList.remove('show');
            }
        });

        document.getElementById('adminPanelBtn').addEventListener('click', () => {
            adminPanel.classList.toggle('show');
            if (adminPanel.classList.contains('show') && (userRank === 'admin' || userRank === 'owner')) {
                loadPendingUpdates();
            }
        });

        document.getElementById('adminCloseBtn').addEventListener('click', () => {
            adminPanel.classList.remove('show');
        });

        document.getElementById('adminReloadBtn').addEventListener('click', () => {
            location.reload();
        });

        document.getElementById('adminShutdownBtn').addEventListener('click', () => {
            if (confirm('Shutdown site?')) {
                alert('Site shutdown initiated');
                location.href = '/login.html';
            }
        });

        document.getElementById('logoutBtn').addEventListener('click', () => {
            localStorage.clear();
            window.location.href = '/login.html';
        });

        document.getElementById('adminEditBtn').addEventListener('click', async () => {
            adminPanel.classList.remove('show');
            
            try {
                const res = await fetch('/api/all-updates', {
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                const updates = await res.json();

                const list = document.getElementById('deleteList');
                list.innerHTML = updates.map(u => `

                });

        document.getElementById('editSaveBtn').addEventListener('click', async () => {
            const id = window.currentEditId;
            const title = document.getElementById('editTitle').value;
            const message = document.getElementById('editMessage').value;
            const value = document.getElementById('editValue').value;

            if (!title || !message || !value) {
                alert('All fields required!');
                return;
            }

            try {
                const res = await fetch(`/api/updates/${id}`, {
                    method: 'PUT',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${token}`
                    },
                    body: JSON.stringify({ title, message, value })
                });

                if (res.ok) {

                    method: 'DELETE',
                    headers: { 'Authorization': `Bearer ${token}` }
                });

                if (res.ok) {
                    alert('Update deleted!');
                    editModal.classList.remove('show');
                    deleteModal.classList.remove('show');
                } else {
                    alert('Error deleting update');

            } catch (err) {

        function deleteUpdate(id) {
            if (!confirm('Delete this update?')) return;

            fetch(`/api/updates/${id}`, {
                method: 'DELETE',
                headers: { 'Authorization': `Bearer ${token}` }
            }).then(res => {
                if (res.ok) {
                    alert('Update deleted!');
                    deleteModal.classList.remove('show');
                } else {
                    alert('Error deleting update');
                }
            }).catch(err => {
                alert('Error deleting update');
            });
        }

        function warnUser(username) {
            if (!confirm(`Warn @${username}?`)) return;

            fetch('/api/warn-user', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                    'Authorization': `Bearer ${token}`
                },
                body: JSON.stringify({ username, reason: 'Warning from admin' })
            }).then(res => {
                if (res.ok) {
                    alert(`@${username} has been warned!`);
                    warnModal.classList.remove('show');
                } else {
                    alert('Error warning user');
                }
            }).catch(err => {
                alert('Error warning user');
            });
        }

        function banUser(username) {
            if (!confirm(`Ban @${username}? They will become a regular user.`)) return;

            fetch('/api/ban-user', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                    'Authorization': `Bearer ${token}`
                },
                body: JSON.stringify({ username, reason: 'Banned by admin', banType: 'account' })
            }).then(res => {
                if (res.ok) {
                    alert(`@${username} has been banned!`);
                    banModal.classList.remove('show');
                } else {
                    return res.json().then(err => {
                        alert(err.error || 'Error banning user');
                    });
                }
            }).catch(err => {
                alert('Error banning user');
            });
        }

        function approvePending(id) {
            fetch(`/api/suggestions/${id}/approve`, {
                method: 'PUT',
                headers: { 'Authorization': `Bearer ${token}` }
            }).then(res => {
                if (res.ok) {
                    alert('Update approved!');
                    loadApprovedUpdates();
                    document.getElementById('adminManagePendingBtn').click();
                } else {
                    alert('Error approving update');
                }
            }).catch(err => {
                alert('Error approving update');
            });
        }

        function rejectPending(id) {
            if (!confirm('Reject this update?')) return;

            fetch(`/api/suggestions/${id}`, {
                method: 'DELETE',
                headers: { 'Authorization': `Bearer ${token}` }
            }).then(res => {
                if (res.ok) {
                    alert('Update rejected!');

                } else {

                }
            }).catch(err => {

            });
        }

                e.preventDefault();
                currentValue += btn.dataset.char;
                document.getElementById('valueDisplay').textContent = currentValue || '-';
            });
        });

        document.getElementById('updateForm').addEventListener('submit', async (e) => {
            e.preventDefault();

            const title = document.getElementById('titleInput').value.trim();
            const message = document.getElementById('messageInput').value.trim();
            const value = currentValue.trim();

            if (!title || !message || !value) {
                alert('All fields required!');
                return;
            }

            try {
                const res = await fetch('/api/updates', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${token}`
                    },
                    body: JSON.stringify({ title, message, value, username: user.username })
                });

                if (!res.ok) throw new Error('Submit failed');

                document.getElementById('successMessage').classList.add('show');
                document.getElementById('updateForm').reset();
                currentValue = '';
                document.getElementById('valueDisplay').textContent = '-';

                setTimeout(() => {
                    document.getElementById('successMessage').classList.remove('show');
                }, 2000);

                alert(err.message);
            }
        });

        document.getElementById('refreshBtn').addEventListener('click', () => location.reload());

        loadApprovedUpdates();

        async function loadApprovedUpdates() {
            try {
                const res = await fetch('/api/updates');
                const updates = await res.json();
                const list = document.getElementById('approvedUpdatesList');

                if (!updates || updates.length === 0) {
                    list.innerHTML = '<div style="text-align: center; padding: 20px; color: var(--text-secondary);">No approved updates yet</div>';
                    return;
                }

                list.innerHTML = updates.map(u => `
                    <div class="update-item">
                        <div class="update-item-title">${u.title}</div>
                        <div class="update-item-user">@${u.username}</div>
                        <div class="update-item-value">${u.value}</div>
                        <div style="color: var(--text-secondary); font-size: 0.8em; margin-top: 8px;">${u.message}</div>
                    </div>
                `).join('');
            } catch (err) {
                console.error('Error loading approved updates:', err);
            }
        }

        async function loadPendingUpdates() {
            try {
                const res = await fetch('/api/suggestions', {
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                
                if (!res.ok) {
                    console.error('Error loading pending updates');
                    return;
                }

                const updates = await res.json();
                const adminActionsDiv = document.querySelector('.admin-actions');
                let pendingDiv = document.getElementById('pendingUpdatesDiv');

                if (!pendingDiv) {
                    pendingDiv = document.createElement('div');
                    pendingDiv.id = 'pendingUpdatesDiv';
                    adminActionsDiv.parentNode.insertBefore(pendingDiv, adminActionsDiv.nextSibling);
                }

                if (!updates || updates.length === 0) {
                    pendingDiv.innerHTML = '<div style="text-align: center; padding: 15px; color: var(--text-secondary); font-size: 0.85em;">No pending updates</div>';
                    return;
                }

                pendingDiv.innerHTML = '<div style="margin-top: 15px; padding-top: 15px; border-top: 1px solid rgba(42, 47, 74, 0.5);"><p style="color: var(--primary); font-weight: 700; margin-bottom: 10px; font-size: 0.9em;">Pending Updates</p>' + updates.map(u => `
                    <div class="update-item" style="margin-bottom: 10px;">
                        <div class="update-item-title">${u.title}</div>
                        <div class="update-item-user">@${u.username}</div>
                        <div class="update-item-value">${u.value}</div>
                        <div style="color: var(--text-secondary); font-size: 0.75em; margin-top: 6px;">${u.message}</div>
                    </div>
                `).join('') + '</div>';
            } catch (err) {
                console.error('Error loading pending updates:', err);
            }
        }
